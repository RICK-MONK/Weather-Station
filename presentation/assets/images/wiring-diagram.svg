  <text x="800" y="785" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" fill="#4a677d">Digital DHT22 on GPIO 4, I2C BMP280 on GPIO 21/22, analog soil sensor on GPIO 34</text>
