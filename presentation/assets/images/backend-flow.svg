<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f8fbfd"/>
      <stop offset="100%" stop-color="#eef5f9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#123c56" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#0b7285"/>
    </marker>
  </defs>

  <rect width="1400" height="800" fill="url(#bg)"/>
  <text x="700" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#0f5b6e">
    Backend Pipeline
  </text>

  <g filter="url(#shadow)" font-family="Arial, Helvetica, sans-serif">
    <rect x="80" y="240" width="220" height="220" rx="24" fill="#ffffff" stroke="#d7e3ec" stroke-width="3"/>
    <rect x="350" y="240" width="220" height="220" rx="24" fill="#ffffff" stroke="#d7e3ec" stroke-width="3"/>
    <rect x="620" y="240" width="220" height="220" rx="24" fill="#ffffff" stroke="#d7e3ec" stroke-width="3"/>
    <rect x="890" y="240" width="220" height="220" rx="24" fill="#ffffff" stroke="#d7e3ec" stroke-width="3"/>
    <rect x="1160" y="240" width="160" height="220" rx="24" fill="#ffffff" stroke="#d7e3ec" stroke-width="3"/>

    <text x="190" y="292" text-anchor="middle" font-size="28" font-weight="700" fill="#0f5b6e">Gateway</text>
    <text x="190" y="330" text-anchor="middle" font-size="21" fill="#4a677d">Receives sensor payload</text>
    <text x="190" y="362" text-anchor="middle" font-size="21" fill="#4a677d">Queues backend update</text>

    <text x="460" y="292" text-anchor="middle" font-size="28" font-weight="700" fill="#0f5b6e">Flask API</text>
    <text x="460" y="330" text-anchor="middle" font-size="21" fill="#4a677d">`POST /api/weather/update`</text>
    <text x="460" y="362" text-anchor="middle" font-size="21" fill="#4a677d">Accepts device JSON</text>

    <text x="730" y="292" text-anchor="middle" font-size="28" font-weight="700" fill="#0f5b6e">Validation</text>
    <text x="730" y="330" text-anchor="middle" font-size="21" fill="#4a677d">Checks fields</text>
    <text x="730" y="362" text-anchor="middle" font-size="21" fill="#4a677d">Adds timestamps</text>

    <text x="1000" y="292" text-anchor="middle" font-size="28" font-weight="700" fill="#0f5b6e">MongoDB</text>
    <text x="1000" y="330" text-anchor="middle" font-size="21" fill="#4a677d">Stores history</text>
    <text x="1000" y="362" text-anchor="middle" font-size="21" fill="#4a677d">Supports queries</text>

    <text x="1240" y="292" text-anchor="middle" font-size="28" font-weight="700" fill="#0f5b6e">Frontend</text>
    <text x="1240" y="330" text-anchor="middle" font-size="21" fill="#4a677d">Latest</text>
    <text x="1240" y="362" text-anchor="middle" font-size="21" fill="#4a677d">Recent</text>
    <text x="1240" y="394" text-anchor="middle" font-size="21" fill="#4a677d">Analysis</text>

    <rect x="130" y="390" rx="12" ry="12" width="120" height="42" fill="#dff4fb"/>
    <text x="190" y="418" text-anchor="middle" font-size="18" font-weight="700" fill="#0b7285">JSON payload</text>

    <rect x="405" y="390" rx="12" ry="12" width="110" height="42" fill="#dff4fb"/>
    <text x="460" y="418" text-anchor="middle" font-size="18" font-weight="700" fill="#0b7285">REST API</text>

    <rect x="672" y="390" rx="12" ry="12" width="116" height="42" fill="#fff4db"/>
    <text x="730" y="418" text-anchor="middle" font-size="18" font-weight="700" fill="#c27900">Clean data</text>

    <g transform="translate(962 382)">
      <ellipse cx="38" cy="12" rx="36" ry="12" fill="#d7ecf6" stroke="#2b83be" stroke-width="3"/>
      <path d="M2 12 v38 c0 8 16 14 36 14 s36-6 36-14 V12" fill="#d7ecf6" stroke="#2b83be" stroke-width="3"/>
      <path d="M2 31 c0 8 16 14 36 14 s36-6 36-14" fill="none" stroke="#2b83be" stroke-width="3"/>
    </g>

    <rect x="1190" y="414" rx="10" ry="10" width="100" height="30" fill="#dff4fb"/>
    <text x="1240" y="435" text-anchor="middle" font-size="17" font-weight="700" fill="#0b7285">Vue views</text>
  </g>

  <path d="M300 350 H350" stroke="#0b7285" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M570 350 H620" stroke="#0b7285" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M840 350 H890" stroke="#0b7285" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M1110 350 H1160" stroke="#0b7285" stroke-width="8" marker-end="url(#arrow)"/>

  <text x="700" y="650" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#4a677d">
    The backend is what gives the product memory, traceability, and analytics instead of only live readings.
  </text>
</svg>
