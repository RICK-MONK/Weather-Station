<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="800" viewBox="0 0 1400 800">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5fbff"/>
      <stop offset="100%" stop-color="#e7f1f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f5b6e" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1400" height="800" fill="url(#bg)"/>

  <text x="700" y="90" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#0f5b6e">
    Sensing To Dashboard Flow
  </text>

  <g filter="url(#shadow)">
    <rect x="90" y="210" rx="26" ry="26" width="240" height="300" fill="#ffffff" stroke="#cddce8" stroke-width="3"/>
    <rect x="410" y="210" rx="26" ry="26" width="240" height="300" fill="#ffffff" stroke="#cddce8" stroke-width="3"/>
    <rect x="730" y="210" rx="26" ry="26" width="240" height="300" fill="#ffffff" stroke="#cddce8" stroke-width="3"/>
    <rect x="1050" y="210" rx="26" ry="26" width="240" height="300" fill="#ffffff" stroke="#cddce8" stroke-width="3"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="210" y="270" text-anchor="middle" font-size="28" font-weight="700" fill="#0f5b6e">Sensor Node</text>
    <text x="210" y="315" text-anchor="middle" font-size="22" fill="#4a677d">ESP32 + DHT22</text>
    <text x="210" y="350" text-anchor="middle" font-size="22" fill="#4a677d">BMP280 + Soil Probe</text>
    <circle cx="165" cy="405" r="18" fill="#facc15"/>
    <circle cx="210" cy="405" r="18" fill="#38bdf8"/>
    <circle cx="255" cy="405" r="18" fill="#84cc16"/>
    <text x="210" y="455" text-anchor="middle" font-size="20" fill="#4a677d">Captures live readings</text>

    <text x="530" y="270" text-anchor="middle" font-size="28" font-weight="700" fill="#0f5b6e">Wireless Gateway</text>
    <text x="530" y="315" text-anchor="middle" font-size="22" fill="#4a677d">ESP-NOW receiver</text>
    <text x="530" y="350" text-anchor="middle" font-size="22" fill="#4a677d">Touch TFT display</text>
    <rect x="462" y="388" rx="12" ry="12" width="136" height="72" fill="#0f172a"/>
    <rect x="480" y="403" rx="8" ry="8" width="100" height="42" fill="#1e293b"/>
    <text x="530" y="455" text-anchor="middle" font-size="20" fill="#4a677d">Shows status locally</text>

    <text x="850" y="270" text-anchor="middle" font-size="28" font-weight="700" fill="#0f5b6e">Backend</text>
    <text x="850" y="315" text-anchor="middle" font-size="22" fill="#4a677d">Flask API</text>
    <text x="850" y="350" text-anchor="middle" font-size="22" fill="#4a677d">Validation + timestamps</text>
    <rect x="792" y="388" rx="12" ry="12" width="116" height="72" fill="#dff4fb" stroke="#82cde2"/>
    <path d="M820 404 h60 M820 420 h60 M820 436 h60" stroke="#0f5b6e" stroke-width="6" stroke-linecap="round"/>
    <text x="850" y="455" text-anchor="middle" font-size="20" fill="#4a677d">Turns packets into records</text>

    <text x="1170" y="270" text-anchor="middle" font-size="28" font-weight="700" fill="#0f5b6e">Monitoring UI</text>
    <text x="1170" y="315" text-anchor="middle" font-size="22" fill="#4a677d">MongoDB + Vue dashboard</text>
    <text x="1170" y="350" text-anchor="middle" font-size="22" fill="#4a677d">History, trends, analysis</text>
    <rect x="1098" y="390" rx="14" ry="14" width="144" height="82" fill="#0f172a"/>
    <path d="M1120 450 L1150 430 L1185 438 L1220 410" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="1120" cy="450" r="5" fill="#22d3ee"/>
    <circle cx="1150" cy="430" r="5" fill="#22d3ee"/>
    <circle cx="1185" cy="438" r="5" fill="#22d3ee"/>
    <circle cx="1220" cy="410" r="5" fill="#22d3ee"/>
    <text x="1170" y="455" text-anchor="middle" font-size="20" fill="#4a677d">Remote visibility and history</text>
  </g>

  <path d="M330 360 H410" stroke="#f97316" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M650 360 H730" stroke="#f97316" stroke-width="8" marker-end="url(#arrow)"/>
  <path d="M970 360 H1050" stroke="#f97316" stroke-width="8" marker-end="url(#arrow)"/>

  <text x="370" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#f97316">ESP-NOW</text>
  <text x="690" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#f97316">HTTP POST</text>
  <text x="1010" y="335" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#f97316">API + DB</text>

  <text x="700" y="690" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#4a677d">
    The product creates value by combining sensing, local display, backend storage, and browser access.
  </text>
</svg>
